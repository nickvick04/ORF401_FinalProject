name: ZeroQueue
options:
  bundleIdPrefix: com.nickvick
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""   # Fill in your Team ID from developer.apple.com if you have one

targets:
  ZeroQueue:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "SETUP.md"
          - "Secrets.example.txt"
          - "ZeroQueue.xcodeproj/**"
    resources:
      - path: Assets.xcassets
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: ZeroQueue
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "ZeroQueue uses your camera to scan item barcodes while you shop."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nickvick.zeroqueue
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
